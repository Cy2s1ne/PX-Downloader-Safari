name: Build Safari Extension
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /Users/runner/Library/Android
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/.ghcup
          df -h /

      - name: Checkout
        uses: actions/checkout@v4

      - name: Convert to Safari Web Extension
        run: |
          xcrun safari-web-extension-converter "${{ github.workspace }}" \
            --project-location ./build \
            --app-name "PX Downloader" \
            --bundle-identifier com.pxdownloader.safari \
            --swift \
            --no-prompt \
            --no-open

      - name: Build with Xcode
        run: |
          cd "./build/PX Downloader"
          xcodebuild -project "PX Downloader.xcodeproj" \
            -scheme "PX Downloader (macOS)" \
            -configuration Release \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            -quiet

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PX-Downloader-Safari
          path: ./build/PX Downloader/DerivedData/Build/Products/Release/
